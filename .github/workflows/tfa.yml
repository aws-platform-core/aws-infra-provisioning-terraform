name: Terraform Apply

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  BUILD_ID: ${{ github.sha }}

jobs:
  terraform-apply:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::684306805506:role/github-deploy-arm
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Find changed stack directories
        id: changed
        shell: bash
        run: |
          STACK_DIRS=$(git diff --name-only HEAD~1 HEAD | grep '^stacks/' | cut -d/ -f1-2 | sort -u || true)
          echo "stack_dirs<<EOF" >> $GITHUB_OUTPUT
          echo "$STACK_DIRS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Terraform apply
        if: steps.changed.outputs.stack_dirs != ''
        shell: bash
        run: |
          while read -r dir; do
            [ -z "$dir" ] && continue

            terraform -chdir="$dir" init -input=false
            terraform -chdir="$dir" apply -auto-approve -input=false
          done <<< "${{ steps.changed.outputs.stack_dirs }}"