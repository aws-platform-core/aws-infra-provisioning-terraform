name: Terraform Apply

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  REQUESTS_TABLE: infra_requests

jobs:
  terraform-apply:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::684306805506:role/InfraProvisioningGitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Find changed stack directories
        id: changed
        shell: bash
        run: |
          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.sha }}"

          echo "Before SHA: $BEFORE_SHA"
          echo "After SHA: $AFTER_SHA"

          STACK_DIRS=$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA" | grep '^stacks/' | cut -d/ -f1-2 | sort -u || true)

          echo "stack_dirs<<EOF" >> $GITHUB_OUTPUT
          echo "$STACK_DIRS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Terraform apply and update request status
        if: steps.changed.outputs.stack_dirs != ''
        shell: bash
        run: |
          set -euo pipefail

          while read -r dir; do
            [ -z "$dir" ] && continue

            REQUEST_ID="$(basename "$dir")"
            echo "Applying stack for request: $REQUEST_ID"

            bash scripts/update-request-status.sh "$REQUEST_ID" "APPLY_IN_PROGRESS"

            if terraform -chdir="$dir" init -input=false && terraform -chdir="$dir" apply -auto-approve -input=false; then
              bash scripts/update-request-status.sh "$REQUEST_ID" "COMPLETED"
            else
              bash scripts/update-request-status.sh "$REQUEST_ID" "FAILED"
              exit 1
            fi
          done <<< "${{ steps.changed.outputs.stack_dirs }}"