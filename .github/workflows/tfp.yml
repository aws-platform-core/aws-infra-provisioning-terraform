name: Terraform Plan

on:
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-east-1
  REQUESTS_TABLE: infra_requests

jobs:
  terraform-plan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::684306805506:role/InfraProvisioningGitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Find changed stack directories
        id: changed
        shell: bash
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          echo "Base SHA: $BASE_SHA"
          echo "Head SHA: $HEAD_SHA"

          STACK_DIRS=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep '^stacks/' | cut -d/ -f1-2 | sort -u || true)

          echo "stack_dirs<<EOF" >> $GITHUB_OUTPUT
          echo "$STACK_DIRS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Terraform fmt
        if: steps.changed.outputs.stack_dirs != ''
        shell: bash
        run: |
          while read -r dir; do
            [ -z "$dir" ] && continue
            terraform -chdir="$dir" fmt
          done <<< "${{ steps.changed.outputs.stack_dirs }}"

      - name: Terraform init, validate, plan and update request status
        if: steps.changed.outputs.stack_dirs != ''
        shell: bash
        run: |
          set -euo pipefail

          rm -f plan-summary.txt

          while read -r dir; do
            [ -z "$dir" ] && continue

            REQUEST_ID="$(basename "$dir")"
            echo "Planning stack for request: $REQUEST_ID"

            echo "## $dir" >> plan-summary.txt
            echo '```' >> plan-summary.txt

            if terraform -chdir="$dir" init -input=false && \
               terraform -chdir="$dir" validate && \
               terraform -chdir="$dir" plan -input=false -no-color >> plan-summary.txt; then
              bash scripts/update-request-status.sh "$REQUEST_ID" "PLAN_COMPLETED"
            else
              bash scripts/update-request-status.sh "$REQUEST_ID" "PLAN_FAILED"
              echo '```' >> plan-summary.txt
              echo "" >> plan-summary.txt
              exit 1
            fi

            echo '```' >> plan-summary.txt
            echo "" >> plan-summary.txt
          done <<< "${{ steps.changed.outputs.stack_dirs }}"

      - name: Comment plan on PR
        if: steps.changed.outputs.stack_dirs != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('plan-summary.txt', 'utf8');
            const body = `## Terraform Plan\n\n${summary.substring(0, 65000)}`;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });