name: Terraform Plan

on:
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-east-1

jobs:
  terraform-plan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::684306805506:role/InfraProvisioningGitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Find changed stack directories
        id: changed
        shell: bash
        run: |
          STACK_DIRS=$(git diff --name-only origin/main...HEAD | grep '^stacks/' | cut -d/ -f1-2 | sort -u || true)
          echo "stack_dirs<<EOF" >> $GITHUB_OUTPUT
          echo "$STACK_DIRS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Terraform fmt check
        if: steps.changed.outputs.stack_dirs != ''
        shell: bash
        run: |
          while read -r dir; do
            [ -z "$dir" ] && continue
            terraform -chdir="$dir" fmt -check
          done <<< "${{ steps.changed.outputs.stack_dirs }}"

      - name: Terraform init, validate, plan
        if: steps.changed.outputs.stack_dirs != ''
        shell: bash
        run: |
          rm -f plan-summary.txt
          while read -r dir; do
            [ -z "$dir" ] && continue

            echo "## $dir" >> plan-summary.txt
            echo '```' >> plan-summary.txt

            terraform -chdir="$dir" init -input=false
            terraform -chdir="$dir" validate
            terraform -chdir="$dir" plan -input=false -no-color >> plan-summary.txt

            echo '```' >> plan-summary.txt
            echo "" >> plan-summary.txt
          done <<< "${{ steps.changed.outputs.stack_dirs }}"

      - name: Comment plan on PR
        if: steps.changed.outputs.stack_dirs != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('plan-summary.txt', 'utf8');
            const body = `## Terraform Plan\n\n${summary.substring(0, 65000)}`;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });